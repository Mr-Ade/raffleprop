# RaffleProp Nginx configuration
# TLS terminates here — TLS 1.3 only, HSTS, security headers

upstream api {
    server api:3001;
    keepalive 32;
}

upstream web {
    server web:3000;
    keepalive 16;
}

upstream admin {
    server admin:3002;
    keepalive 16;
}

# Redirect HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name raffleprop.com admin.raffleprop.com;
    return 301 https://$host$request_uri;
}

# Main site — raffleprop.com
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name raffleprop.com;

    # TLS 1.3 only
    ssl_protocols TLSv1.3;
    ssl_certificate /etc/ssl/certs/raffleprop.com.pem;
    ssl_certificate_key /etc/ssl/private/raffleprop.com.key;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # HSTS (2 years)
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Webhook endpoints — pass raw body to API
    location /api/webhooks/ {
        proxy_pass http://api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Do not buffer webhooks — HMAC verification needs exact body
        proxy_request_buffering off;
        proxy_buffering off;
    }

    # API routes
    location /api/ {
        proxy_pass http://api;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;

        # Rate limit at Nginx level (belt-and-suspenders with express-rate-limit)
        limit_req zone=api_limit burst=20 nodelay;
    }

    # SSE — long-lived connections
    location ~* /api/campaigns/.*/tickets/sse {
        proxy_pass http://api;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 600s;
        proxy_buffering off;
        proxy_cache off;
    }

    # Next.js frontend
    location / {
        proxy_pass http://web;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Static assets — long cache
    location ~* \.(js|css|png|jpg|jpeg|webp|svg|ico|woff2)$ {
        proxy_pass http://web;
        proxy_cache_valid 200 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
    }
}

# Admin subdomain — admin.raffleprop.com
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name admin.raffleprop.com;

    ssl_protocols TLSv1.3;
    ssl_certificate /etc/ssl/certs/admin.raffleprop.com.pem;
    ssl_certificate_key /etc/ssl/private/admin.raffleprop.com.key;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' https://api.raffleprop.com;" always;

    # Admin is IP-restricted in production (VPN/office IPs only)
    # allow 203.0.113.0/24;  # Office IP range
    # deny all;

    location /api/ {
        proxy_pass http://api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        limit_req zone=admin_limit burst=10 nodelay;
    }

    location / {
        proxy_pass http://admin;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=admin_limit:1m rate=10r/s;
