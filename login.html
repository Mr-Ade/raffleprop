<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Log In | RaffleProp</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" media="print" onload="this.media='all'">
<noscript><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"></noscript>
</head>
<body style="background:var(--bg);min-height:100vh;">
<a href="#main-content" class="skip-link">Skip to main content</a>
<div id="nav-placeholder"></div>
<main id="main-content">

<div style="min-height:calc(100vh - 65px);display:flex;align-items:center;justify-content:center;padding:5rem 1.5rem 3rem;margin-top:65px;">
  <div style="width:100%;max-width:440px;">

    <!-- Email/Password Login -->
    <div id="login-email-form">
      <div style="text-align:center;margin-bottom:2rem;">
        <a href="index.html" style="font-size:1.5rem;font-weight:900;color:var(--green-primary);letter-spacing:-0.03em;">Raffle<span style="color:var(--gold);">Prop</span></a>
        <h1 style="font-size:1.75rem;font-weight:900;letter-spacing:-0.02em;margin-top:1.25rem;">Welcome Back</h1>
        <p style="color:var(--text-muted);margin-top:0.5rem;">Log in to your RaffleProp account</p>
      </div>

      <div class="auth-card">
        <!-- Login method tabs -->
        <div class="pay-tabs" role="tablist" aria-label="Login method" style="margin-bottom:1.5rem;">
          <button type="button" role="tab" id="tab-email" aria-selected="true" aria-controls="email-login-form"
            class="pay-tab active" onclick="showLoginMethod('email',this)">
            <i class="fa-solid fa-envelope" aria-hidden="true"></i> Email
          </button>
          <button type="button" role="tab" id="tab-phone" aria-selected="false" aria-controls="phone-login-form"
            class="pay-tab" onclick="showLoginMethod('phone',this)">
            <i class="fa-solid fa-mobile-screen" aria-hidden="true"></i> Phone + OTP
          </button>
        </div>

        <!-- Email form -->
        <form id="email-login-form" role="tabpanel" aria-labelledby="tab-email" onsubmit="handleEmailLogin(event)">
          <div class="form-group">
            <label class="form-label" for="login-email">Email Address <span class="required">*</span></label>
            <input type="email" id="login-email" class="form-input" placeholder="adaeze@example.com" value="demo@raffleprop.ng" required>
          </div>
          <div class="form-group" style="margin-bottom:0.75rem;">
            <label class="form-label" for="login-password">Password <span class="required">*</span></label>
            <div style="position:relative;">
              <input type="password" id="login-password" class="form-input" style="padding-right:2.75rem;" placeholder="Enter password" value="demo1234" required>
              <button type="button" onclick="togglePwd(this)" style="position:absolute;right:0.875rem;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text-muted);cursor:pointer;"><i class="fa-solid fa-eye"></i></button>
            </div>
          </div>
          <div style="text-align:right;margin-bottom:1.25rem;"><a href="#" onclick="forgotPassword(event)" style="font-size:0.875rem;color:var(--green-primary);font-weight:600;">Forgot password?</a></div>
          <div style="padding:0.625rem;background:var(--green-50);border-radius:8px;font-size:0.8125rem;color:var(--green-primary);font-weight:500;margin-bottom:1rem;text-align:center;">
            Demo credentials pre-filled. Click Log In to try the platform.
          </div>
          <button type="submit" class="btn btn-primary btn-full btn-lg">Log In <i class="fa-solid fa-arrow-right"></i></button>
        </form>

        <!-- Phone OTP form -->
        <form id="phone-login-form" role="tabpanel" aria-labelledby="tab-phone" style="display:none;" onsubmit="handlePhoneLogin(event)">
          <div class="form-group">
            <label class="form-label" for="phone-login-number">Phone Number <span class="required">*</span></label>
            <div style="position:relative;">
              <span style="position:absolute;left:0.875rem;top:50%;transform:translateY(-50%);font-size:0.875rem;color:var(--text-muted);font-weight:500;" aria-hidden="true">🇳🇬 +234</span>
              <input type="tel" id="phone-login-number" class="form-input" style="padding-left:5rem;" placeholder="080 1234 5678" required>
            </div>
          </div>
          <button type="submit" class="btn btn-primary btn-full btn-lg">Send OTP Code <i class="fa-solid fa-arrow-right"></i></button>
        </form>

        <div style="margin-top:1.5rem;">
          <div style="position:relative;margin-bottom:1.25rem;"><div style="height:1px;background:var(--border);"></div><span style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:#fff;padding:0 0.75rem;font-size:0.8125rem;color:var(--text-muted);">or</span></div>
          <button onclick="googleLogin()" style="display:flex;align-items:center;justify-content:center;gap:0.75rem;width:100%;padding:0.75rem;border:1.5px solid var(--border);border-radius:10px;background:#fff;cursor:pointer;font-size:0.9375rem;font-weight:600;transition:background 0.2s;" onmouseover="this.style.background='var(--bg)'" onmouseout="this.style.background='#fff'">
            <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#4285F4" d="M46.5 24.5c0-1.6-.1-3.1-.4-4.5H24v8.5h12.7c-.6 3-2.3 5.5-4.9 7.2v6h7.9c4.6-4.3 7.3-10.7 7.3-17.2z"/><path fill="#34A853" d="M24 48c6.5 0 12-2.2 16-5.8l-7.9-6c-2.2 1.5-5 2.3-8.1 2.3-6.2 0-11.5-4.2-13.4-9.9H2.5v6.2C6.5 42.6 14.7 48 24 48z"/><path fill="#FBBC05" d="M10.6 28.6c-.5-1.5-.8-3-.8-4.6s.3-3.1.8-4.6v-6.2H2.5C.9 16.6 0 20.2 0 24s.9 7.4 2.5 10.8l8.1-6.2z"/><path fill="#EA4335" d="M24 9.5c3.5 0 6.6 1.2 9 3.5l6.7-6.7C35.9 2.6 30.5 0 24 0 14.7 0 6.5 5.4 2.5 13.2l8.1 6.2C12.5 13.7 17.8 9.5 24 9.5z"/></svg>
            Continue with Google
          </button>
        </div>
        <p style="text-align:center;font-size:0.875rem;color:var(--text-muted);margin-top:1.5rem;">
          New to RaffleProp? <a href="register.html" style="color:var(--green-primary);font-weight:600;">Create account</a>
        </p>
      </div>
    </div>

    <!-- OTP Verification (phone login) -->
    <div id="login-otp-step" style="display:none;">
      <div style="text-align:center;margin-bottom:2rem;">
        <div style="width:64px;height:64px;background:var(--green-50);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 1rem;"><i class="fa-solid fa-mobile-screen" style="font-size:1.75rem;color:var(--green-primary);"></i></div>
        <h2 style="font-size:1.625rem;font-weight:900;letter-spacing:-0.02em;">Enter OTP</h2>
        <p style="color:var(--text-muted);margin-top:0.5rem;">6-digit code sent to your phone</p>
        <div style="margin-top:0.5rem;font-size:0.8125rem;color:var(--success);font-weight:600;background:var(--green-50);padding:0.375rem 0.75rem;border-radius:100px;display:inline-block;">Demo code: 1 2 3 4 5 6</div>
      </div>
      <div class="auth-card">
        <div class="otp-inputs" id="phone-otp-inputs" style="margin-bottom:1.5rem;">
          <input type="text" class="otp-input" maxlength="1" inputmode="numeric">
          <input type="text" class="otp-input" maxlength="1" inputmode="numeric">
          <input type="text" class="otp-input" maxlength="1" inputmode="numeric">
          <input type="text" class="otp-input" maxlength="1" inputmode="numeric">
          <input type="text" class="otp-input" maxlength="1" inputmode="numeric">
          <input type="text" class="otp-input" maxlength="1" inputmode="numeric">
        </div>
        <button onclick="verifyPhoneOTP()" class="btn btn-primary btn-full btn-lg">Verify & Log In</button>
        <button onclick="document.getElementById('login-email-form').style.display='block';document.getElementById('login-otp-step').style.display='none';" style="display:flex;align-items:center;gap:0.375rem;font-size:0.8125rem;color:var(--text-muted);margin:1rem auto 0;background:none;border:none;cursor:pointer;"><i class="fa-solid fa-arrow-left"></i> Back</button>
      </div>
    </div>

  </div>
</div>

</main>
<div id="footer-placeholder"></div>
<script defer src="js/main.js"></script>
<script>
function togglePwd(btn) {
  const inp = btn.previousElementSibling;
  const show = inp.type === 'password';
  inp.type = show ? 'text' : 'password';
  btn.innerHTML = show ? '<i class="fa-solid fa-eye-slash"></i>' : '<i class="fa-solid fa-eye"></i>';
}

function showLoginMethod(method, btn) {
  document.querySelectorAll('.pay-tab').forEach(t => {
    t.classList.remove('active');
    t.setAttribute('aria-selected', 'false');
  });
  btn.classList.add('active');
  btn.setAttribute('aria-selected', 'true');
  document.getElementById('email-login-form').style.display = method === 'email' ? 'block' : 'none';
  document.getElementById('phone-login-form').style.display = method === 'phone' ? 'block' : 'none';
}

function handleEmailLogin(e) {
  e.preventDefault();
  const email = document.getElementById('login-email').value;
  const user = { id: 'usr_demo', name: 'Adaeze Okonkwo', email, phone: '08012345678', referralCode: 'REF-ADAEZE25', referralEarnings: 15000, referralCount: 6, createdAt: '2025-01-01' };
  Auth.setUser(user);
  Toast.success('Welcome back!', 'Logged in successfully.');
  const params = new URLSearchParams(window.location.search);
  const redirect = params.get('redirect') || 'dashboard.html';
  setTimeout(() => window.location.href = redirect, 800);
}

function handlePhoneLogin(e) {
  e.preventDefault();
  document.getElementById('login-email-form').style.display = 'none';
  document.getElementById('login-otp-step').style.display = 'block';
  initPhoneOTPInputs();
}

function initPhoneOTPInputs() {
  const inputs = document.querySelectorAll('#phone-otp-inputs .otp-input');
  inputs.forEach((inp, i) => {
    inp.value = '';
    inp.addEventListener('input', () => { if (inp.value.length === 1 && i < inputs.length - 1) inputs[i + 1].focus(); });
    inp.addEventListener('keydown', e => { if (e.key === 'Backspace' && !inp.value && i > 0) inputs[i - 1].focus(); });
  });
  inputs[0].focus();
}

function verifyPhoneOTP() {
  const code = Array.from(document.querySelectorAll('#phone-otp-inputs .otp-input')).map(i => i.value).join('');
  if (code !== '123456') { Toast.error('Invalid code', 'Demo code is 1 2 3 4 5 6'); return; }
  const user = { id: 'usr_phone', name: 'Phone User', email: '', phone: document.getElementById('phone-login-number')?.value || '', referralCode: 'REF-PHONE25', referralEarnings: 0, referralCount: 0 };
  Auth.setUser(user);
  Toast.success('Logged in!', 'Welcome back.');
  setTimeout(() => window.location.href = 'dashboard.html', 800);
}

function googleLogin() {
  const user = { id: 'ggl_001', name: 'Google User', email: 'googleuser@gmail.com', phone: '', referralCode: 'REF-GGLUSER25', referralEarnings: 0, referralCount: 0 };
  Auth.setUser(user);
  Toast.success('Signed in with Google!', 'Welcome back.');
  setTimeout(() => window.location.href = 'dashboard.html', 800);
}

function forgotPassword(e) {
  e.preventDefault();
  Toast.info('Password Reset', 'In the live platform, a reset link would be emailed to you.');
}

document.addEventListener('DOMContentLoaded', () => {
  if (Auth.isLoggedIn()) {
    const params = new URLSearchParams(window.location.search);
    window.location.href = params.get('redirect') || 'dashboard.html';
  }
  // Also add a demo admin login button
  const card = document.querySelector('.auth-card');
  if (card) {
    const adminBtn = document.createElement('button');
    adminBtn.className = 'btn btn-sm btn-full';
    adminBtn.style.cssText = 'margin-top:0.75rem;background:#f3f4f6;color:var(--text-muted);font-size:0.8125rem;';
    adminBtn.textContent = '🔧 Login as Admin (Demo)';
    adminBtn.onclick = () => {
      Auth.setUser({ id: 'admin_001', name: 'Admin User', email: 'admin@raffleprop.ng', phone: '', isAdmin: true, referralCode: 'ADMIN', referralEarnings: 0, referralCount: 0 });
      window.location.href = 'admin/index.html';
    };
    card.appendChild(adminBtn);
  }
});
</script>
</body>
</html>
